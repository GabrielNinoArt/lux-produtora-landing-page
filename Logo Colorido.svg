<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&amp;display=swap');
      .lux-text { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 130px; }
      .produtora-text { font-family: 'Montserrat', sans-serif; font-weight: 400; font-size: 16px; letter-spacing: 16px; }
    </style>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C59B27"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFF8DC"/>
      <stop offset="70%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#8B6508"/>
    </linearGradient>
    <filter id="text-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <path d="M 140 70 L 390 175 L 140 280 Z" fill="none" stroke="url(#gold-grad)" stroke-width="8" stroke-linejoin="round" opacity="0.6"/>

  <text x="250" y="225" text-anchor="middle" class="lux-text" fill="url(#gold-grad)" filter="url(#text-shadow)">LUX</text>

  <line x1="80" y1="285" x2="140" y2="285" stroke="url(#gold-grad)" stroke-width="2"/>
  <text x="258" y="290" text-anchor="middle" class="produtora-text" fill="url(#gold-grad)">PRODUTORA</text>
  <line x1="360" y1="285" x2="420" y2="285" stroke="url(#gold-grad)" stroke-width="2"/>
</svg>
